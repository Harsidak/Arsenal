<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM - Interactive Data Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .subtitle {
            color: #888;
            margin-top: 10px;
            font-size: 1.2rem;
        }

        .canvas-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #7b2cbf, #9d4edd);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #888;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .instructions {
            text-align: center;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            margin: 20px 0;
        }

        .instructions h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 50px;
        }

        .equation {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
            font-size: 1.2rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <h1>GLM Visualization</h1>
            <p class="subtitle">Interactive Linear Regression Demo</p>
        </header>

        <div class="instructions">
            <h3>How to Use</h3>
            <p>Click on the canvas to add data points. The regression line will update in real-time!</p>
        </div>

        <div class="canvas-container">
            <canvas id="regressionCanvas" width="800" height="500"></canvas>
        </div>

        <div class="equation" id="equation">
            y = <span id="slope">0.00</span>x + <span id="intercept">0.00</span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="addRandomPoints()">Add Random Points</button>
            <button class="btn btn-secondary" onclick="toggleAnimation()">Toggle Animation</button>
            <button class="btn btn-danger" onclick="clearCanvas()">Clear All</button>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="pointCount">0</div>
                <div class="stat-label">Data Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rSquared">0.00</div>
                <div class="stat-label">R-Squared</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mse">0.00</div>
                <div class="stat-label">MSE</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="correlation">0.00</div>
                <div class="stat-label">Correlation</div>
            </div>
        </div>

        <footer>
            <p>Built with vanilla HTML, CSS & JavaScript</p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('regressionCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        let animating = true;
        let animationId;

        // Initialize particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Linear Regression calculations
        function calculateRegression() {
            if (points.length < 2) return { slope: 0, intercept: 0, r2: 0, mse: 0, corr: 0 };

            const n = points.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;

            points.forEach(p => {
                sumX += p.x;
                sumY += p.y;
                sumXY += p.x * p.y;
                sumX2 += p.x * p.x;
                sumY2 += p.y * p.y;
            });

            const meanX = sumX / n;
            const meanY = sumY / n;

            // Slope (m) and Intercept (b) using least squares
            const denominator = sumX2 - n * meanX * meanX;
            const slope = denominator !== 0 ? (sumXY - n * meanX * meanY) / denominator : 0;
            const intercept = meanY - slope * meanX;

            // R-squared
            let ssTotal = 0, ssResidual = 0;
            points.forEach(p => {
                const predicted = slope * p.x + intercept;
                ssResidual += (p.y - predicted) ** 2;
                ssTotal += (p.y - meanY) ** 2;
            });
            const r2 = ssTotal !== 0 ? 1 - (ssResidual / ssTotal) : 0;

            // MSE
            const mse = ssResidual / n;

            // Correlation coefficient
            const numerator = sumXY - n * meanX * meanY;
            const denomX = Math.sqrt(sumX2 - n * meanX * meanX);
            const denomY = Math.sqrt(sumY2 - n * meanY * meanY);
            const corr = (denomX * denomY !== 0) ? numerator / (denomX * denomY) : 0;

            return { slope, intercept, r2, mse, corr };
        }

        // Draw everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw axes
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.moveTo(20, 0);
            ctx.lineTo(20, canvas.height);
            ctx.stroke();

            // Draw points with glow effect
            points.forEach((p, index) => {
                // Glow
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 20);
                gradient.addColorStop(0, 'rgba(0, 212, 255, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
                ctx.fill();

                // Point
                ctx.fillStyle = `hsl(${(index * 30) % 360}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw regression line
            if (points.length >= 2) {
                const { slope, intercept, r2, mse, corr } = calculateRegression();

                // Update stats
                document.getElementById('slope').textContent = slope.toFixed(2);
                document.getElementById('intercept').textContent = intercept.toFixed(2);
                document.getElementById('rSquared').textContent = r2.toFixed(4);
                document.getElementById('mse').textContent = mse.toFixed(2);
                document.getElementById('correlation').textContent = corr.toFixed(4);

                // Draw line with gradient
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#7b2cbf');
                gradient.addColorStop(1, '#00d4ff');

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, slope * 0 + intercept);
                ctx.lineTo(canvas.width, slope * canvas.width + intercept);
                ctx.stroke();

                // Draw prediction dots
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 1;
                points.forEach(p => {
                    const predicted = slope * p.x + intercept;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x, predicted);
                    ctx.stroke();
                });
                ctx.setLineDash([]);
            }

            // Update point count
            document.getElementById('pointCount').textContent = points.length;

            if (animating) {
                animationId = requestAnimationFrame(draw);
            }
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            points.push({ x, y });
            if (!animating) draw();
        });

        function addRandomPoints() {
            for (let i = 0; i < 10; i++) {
                const x = Math.random() * (canvas.width - 40) + 20;
                const y = Math.random() * (canvas.height - 40) + 20;
                points.push({ x, y });
            }
            if (!animating) draw();
        }

        function clearCanvas() {
            points = [];
            if (!animating) draw();
        }

        function toggleAnimation() {
            animating = !animating;
            if (animating) {
                draw();
            } else {
                cancelAnimationFrame(animationId);
                draw();
            }
        }

        // Initialize
        createParticles();
        draw();
    </script>
</body>
</html>
